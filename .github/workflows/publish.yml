name: Publish image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Dev Container
        uses: docker/build-push-action@v6
        with:
          context: .
          target: devcontainer
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/ohj-perus-jy/ohj-mdbook-tooling:devcontainer
            ghcr.io/ohj-perus-jy/ohj-mdbook-tooling:devcontainer-latest
            ghcr.io/ohj-perus-jy/ohj-mdbook-tooling:devcontainer-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Runner
        uses: docker/build-push-action@v6
        with:
          context: .
          target: mdbook-runner
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/ohj-perus-jy/ohj-mdbook-tooling:runner
            ghcr.io/ohj-perus-jy/ohj-mdbook-tooling:runner-latest
            ghcr.io/ohj-perus-jy/ohj-mdbook-tooling:runner-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
